name: Terraform Live Edge
run-name: "Terraform Live Edge (${{ inputs.action }}, ${{ inputs.environment }}, us-east-1, Backend: ${{ inputs.backend_region }})"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action: plan, apply, plan-destroy, destroy"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - sbx
          - stg
          - prod
      backend_region:
        description: "AWS region where the backend (ALB) is deployed — sets the CloudFront origin"
        required: true
        default: "ap-south-1"
        type: choice
        # Multi-region expansion: add the new region here. The backend must
        # already be applied in that region before running this workflow.
        # See infra-live-edge/terraform/variables.tf (backend_region).
        options:
          - ap-south-1
  workflow_call:
    inputs:
      action:
        type: string
        required: true
      environment:
        type: string
        required: true
      backend_region:
        type: string
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-live-edge-buddy360-${{ inputs.environment }}-us-east-1-${{ inputs.backend_region }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VERSION: "1.13.0"
  TF_VAR_environment:    ${{ inputs.environment }}
  TF_VAR_backend_region: ${{ inputs.backend_region }}

jobs:
  terraform:
    name: Terraform Live Edge ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra-live-edge/terraform
    env:
      TF_IN_AUTOMATION: "1"
      # Resolved from GitHub Environment Secrets so dev/stg/prod each use their own values.
      TF_VAR_app_name:                      ${{ secrets.APP_NAME }}
      TF_VAR_domain_name:                   ${{ secrets.DOMAIN_NAME }}
      TF_VAR_subdomain:                     ${{ secrets.SUBDOMAIN }}
      TF_VAR_hosted_zone_id:                ${{ secrets.HOSTED_ZONE_ID }}
      TF_VAR_acm_certificate_arn_us_east_1: ${{ secrets.ACM_CERTIFICATE_ARN_US_EAST_1 }}
      TF_VAR_spa_bucket_name:          ${{ secrets.SPA_BUCKET_NAME }}
      TF_VAR_assets_bucket_name:       ${{ secrets.ASSETS_BUCKET_NAME }}
      TF_VAR_jwt_public_keys:          ${{ secrets.JWT_PUBLIC_KEYS }}
      TF_VAR_global_logging_bucket_name: ${{ secrets.GLOBAL_LOGGING_BUCKET_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate required secrets
        env:
          ROLE_ARN:                      ${{ secrets.ROLE_ARN }}
          APP_NAME:                      ${{ secrets.APP_NAME }}
          STATE_BUCKET:                  ${{ secrets.STATE_BUCKET }}
          DOMAIN_NAME:                   ${{ secrets.DOMAIN_NAME }}
          SUBDOMAIN:                     ${{ secrets.SUBDOMAIN }}
          HOSTED_ZONE_ID:                ${{ secrets.HOSTED_ZONE_ID }}
          ACM_CERTIFICATE_ARN_US_EAST_1: ${{ secrets.ACM_CERTIFICATE_ARN_US_EAST_1 }}
          SPA_BUCKET_NAME:               ${{ secrets.SPA_BUCKET_NAME }}
          ASSETS_BUCKET_NAME:            ${{ secrets.ASSETS_BUCKET_NAME }}
          JWT_PUBLIC_KEYS:               ${{ secrets.JWT_PUBLIC_KEYS }}
          GLOBAL_LOGGING_BUCKET_NAME:    ${{ secrets.GLOBAL_LOGGING_BUCKET_NAME }}
        run: |
          missing=()
          [[ -z "$ROLE_ARN"                      ]] && missing+=("ROLE_ARN")
          [[ -z "$APP_NAME"                      ]] && missing+=("APP_NAME")
          [[ -z "$STATE_BUCKET"                  ]] && missing+=("STATE_BUCKET")
          [[ -z "$DOMAIN_NAME"                   ]] && missing+=("DOMAIN_NAME")
          [[ -z "$SUBDOMAIN"                     ]] && missing+=("SUBDOMAIN")
          [[ -z "$HOSTED_ZONE_ID"                ]] && missing+=("HOSTED_ZONE_ID")
          [[ -z "$ACM_CERTIFICATE_ARN_US_EAST_1" ]] && missing+=("ACM_CERTIFICATE_ARN_US_EAST_1")
          [[ -z "$SPA_BUCKET_NAME"               ]] && missing+=("SPA_BUCKET_NAME")
          [[ -z "$ASSETS_BUCKET_NAME"            ]] && missing+=("ASSETS_BUCKET_NAME")
          [[ -z "$JWT_PUBLIC_KEYS"               ]] && missing+=("JWT_PUBLIC_KEYS")
          # GLOBAL_LOGGING_BUCKET_NAME required on prod (CloudTrail us-east-1 + WAF logging)
          if [[ "${{ inputs.environment }}" == "prod" && -z "$GLOBAL_LOGGING_BUCKET_NAME" ]]; then
            missing+=("GLOBAL_LOGGING_BUCKET_NAME")
          fi
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Required GitHub environment secrets are not set: ${missing[*]}"
            echo "Add them to the '${{ inputs.environment }}' GitHub environment and re-run."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          role-session-name: terraform-live-edge-${{ inputs.environment }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Verify SSM parameters exist and are readable
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          check_ssm() {
            local name="$1"
            local value
            value=$(aws ssm get-parameter --region us-east-1 --name "$name" --query "Parameter.Value" --output text 2>&1)
            if [[ $? -ne 0 ]]; then
              echo "ERROR: Cannot read SSM parameter '$name': $value"
              echo "Ensure infra-live-backend has been applied and the IAM role has ssm:GetParameter on this path."
              return 1
            fi
            echo "OK: $name"
          }
          APP="${{ secrets.APP_NAME }}"
          ENV="${{ inputs.environment }}"
          check_ssm "/$APP/$ENV/backend/${{ inputs.backend_region }}/alb_internal_fqdn"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.STATE_BUCKET }}" \
            -backend-config="key=terraform-state-files/${{ secrets.APP_NAME }}/${{ inputs.environment }}/edge/us-east-1/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Show plan summary
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          {
            echo "### Terraform Plan — edge / ${{ inputs.environment }} / us-east-1 / Backend: ${{ inputs.backend_region }}"
            echo '```'
            terraform show -no-color tfplan.bin
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artefact
        if: inputs.action == 'plan' || inputs.action == 'apply'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tfplan-edge-${{ inputs.environment }}-us-east-1-backend-${{ inputs.backend_region }}
          path: infra-live-edge/terraform/tfplan.bin
          retention-days: 7

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan.bin

      - name: Terraform Plan (destroy)
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: terraform plan -destroy -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Show destroy plan summary
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: |
          {
            echo "### Terraform Destroy Plan — edge / ${{ inputs.environment }} / us-east-1 / Backend: ${{ inputs.backend_region }}"
            echo '```'
            terraform show -no-color tfplan.bin
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload destroy plan artefact
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tfplan-edge-destroy-${{ inputs.environment }}-us-east-1-backend-${{ inputs.backend_region }}
          path: infra-live-edge/terraform/tfplan.bin
          retention-days: 7

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform apply -auto-approve tfplan.bin

      - name: Delete runtime SSM parameters
        if: inputs.action == 'destroy'
        run: |
          aws ssm delete-parameter \
            --region us-east-1 \
            --name "/${{ secrets.APP_NAME }}/${{ inputs.environment }}/edge/deployed_git_sha" || true
