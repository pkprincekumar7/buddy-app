name: Deploy Live Backend
run-name: Deploy Live Backend (${{ inputs.service }}, ${{ inputs.environment }}, ${{ inputs.aws_region }})

on:
  workflow_dispatch:
    inputs:
      service:
        description: "ECS service(s) to deploy"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - backend
          - worker
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - sbx
          - stg
          - prod
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
        type: choice
        # Multi-region expansion: add the new region here.
        # Full checklist: infra-live-backend/terraform/variables.tf.
        options:
          - ap-south-1
  workflow_call:
    inputs:
      service:
        type: string
        required: false
        default: "both"
      environment:
        type: string
        required: true
      aws_region:
        type: string
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-live-backend-buddy360-${{ inputs.environment }}-${{ inputs.aws_region }}-${{ inputs.service }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy Live Backend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate required secrets
        env:
          ROLE_ARN: ${{ secrets.ROLE_ARN }}
          APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          missing=()
          [[ -z "$ROLE_ARN" ]] && missing+=("ROLE_ARN")
          [[ -z "$APP_NAME" ]] && missing+=("APP_NAME")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Required GitHub environment secrets are not set: ${missing[*]}"
            echo "Add them to the '${{ inputs.environment }}' GitHub environment and re-run."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          role-session-name: deploy-live-backend-${{ inputs.environment }}
          aws-region: ${{ inputs.aws_region }}

      # -------------------------------------------------------------------------
      # Resolve deployment targets.
      # SSM parameters are written automatically by terraform-live-backend.yml
      # after every successful apply — no manual secret copying needed.
      # -------------------------------------------------------------------------
      - name: Resolve deployment targets
        id: tf_outputs
        run: |
          # SSM params are always written to us-east-1 (control-plane region).
          get_ssm() {
            aws ssm get-parameter --region us-east-1 --name "$1" --query "Parameter.Value" --output text 2>/dev/null || echo ""
          }

          ECR_URL=$(get_ssm "/${{ secrets.APP_NAME }}/${{ inputs.environment }}/backend/${{ inputs.aws_region }}/ecr_repository_url")
          CLUSTER=$(get_ssm  "/${{ secrets.APP_NAME }}/${{ inputs.environment }}/backend/${{ inputs.aws_region }}/ecs_cluster_name")
          SERVICE=$(get_ssm  "/${{ secrets.APP_NAME }}/${{ inputs.environment }}/backend/${{ inputs.aws_region }}/ecs_service_name")
          WORKER_SERVICE=$(get_ssm "/${{ secrets.APP_NAME }}/${{ inputs.environment }}/backend/${{ inputs.aws_region }}/ecs_worker_service_name")

          if [ -z "$ECR_URL" ]; then
            echo "ERROR: ECR repository URL not found in SSM. Run terraform-live-backend workflow (apply) first."
            exit 1
          fi
          if [ -z "$CLUSTER" ]; then
            echo "ERROR: ECS cluster name not found in SSM. Run terraform-live-backend workflow (apply) first."
            exit 1
          fi
          if [ -z "$SERVICE" ]; then
            echo "ERROR: ECS service name not found in SSM. Run terraform-live-backend workflow (apply) first."
            exit 1
          fi

          echo "ecr_url=$ECR_URL"               >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=$CLUSTER"            >> "$GITHUB_OUTPUT"
          echo "ecs_service=$SERVICE"            >> "$GITHUB_OUTPUT"
          echo "ecs_worker_service=$WORKER_SERVICE" >> "$GITHUB_OUTPUT"
          echo "ECR:            $ECR_URL"
          echo "Cluster:        $CLUSTER"
          echo "Service:        $SERVICE"
          echo "Worker service: ${WORKER_SERVICE:-<not yet provisioned>}"

      # -------------------------------------------------------------------------
      # Build and push to ECR.
      # Tagged with :<git-sha> only — ECR repository uses IMMUTABLE tags so
      # each tag can only be pushed once. :latest is intentionally omitted;
      # the SHA tag provides full traceability and safe rollbacks without
      # ever needing to overwrite a tag.
      # Git metadata is resolved here and passed as build args so the image
      # can serve it from /api/health without needing .git or the git binary.
      # -------------------------------------------------------------------------
      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve git metadata
        id: git_meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)"                                   >> "$GITHUB_OUTPUT"
          echo "branch=$(git rev-parse --abbrev-ref HEAD)"                           >> "$GITHUB_OUTPUT"
          echo "committed_at=$(git log -1 --format=%cI)"                             >> "$GITHUB_OUTPUT"
          echo "tag=$(git describe --tags --exact-match HEAD 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "image_tag=$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"         >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_SHA="${{ steps.tf_outputs.outputs.ecr_url }}:${{ steps.git_meta.outputs.image_tag }}"
          docker build \
            --platform linux/amd64 \
            --build-arg GIT_SHA="${{ steps.git_meta.outputs.sha }}" \
            --build-arg GIT_BRANCH="${{ steps.git_meta.outputs.branch }}" \
            --build-arg GIT_COMMITTED_AT="${{ steps.git_meta.outputs.committed_at }}" \
            --build-arg GIT_TAG="${{ steps.git_meta.outputs.tag }}" \
            -t "$IMAGE_SHA" \
            -f backend/Dockerfile \
            .

          # ECR repository uses IMMUTABLE tags — pushing the same SHA twice
          # (e.g., re-running a failed workflow) would error. If the tag already
          # exists the image is identical, so skip the push and proceed.
          REPO="${{ steps.tf_outputs.outputs.ecr_url }}"
          TAG="${{ steps.git_meta.outputs.image_tag }}"
          REPO_NAME="${REPO#*/}"    # strip registry host, keep <app>/<env>/backend
          if aws ecr describe-images \
               --repository-name "$REPO_NAME" \
               --image-ids imageTag="$TAG" \
               --output text &>/dev/null; then
            echo "Image $IMAGE_SHA already exists in ECR — skipping push."
          else
            docker push "$IMAGE_SHA"
            echo "Pushed: $IMAGE_SHA"
          fi
          echo "image=$IMAGE_SHA" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------------
      # Register new task definitions — one for the API service, one for the
      # worker service. Both use the same Docker image; the worker's command
      # override (python worker.py) differentiates the entry point.
      # Rollbacks are deterministic: ECS circuit-breaker reverts to the prior
      # revision automatically on failure.
      # -------------------------------------------------------------------------
      - name: Register API task definition
        id: register_td
        if: inputs.service == 'both' || inputs.service == 'backend'
        env:
          IMAGE_SHA: ${{ steps.build.outputs.image }}
        run: |
          TASK_FAMILY="${{ secrets.APP_NAME }}-backend-${{ inputs.environment }}"

          CURRENT_TD=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' --output json)

          # Strip read-only fields that AWS rejects on register-task-definition,
          # then patch the image for the backend container.
          NEW_TD_JSON=$(echo "$CURRENT_TD" | jq \
            --arg img "$IMAGE_SHA" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
             | .containerDefinitions =
                 [.containerDefinitions[]
                  | if .name == "backend" then .image = $img else . end]')

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD_JSON" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "new_td_arn=$NEW_TD_ARN" >> "$GITHUB_OUTPUT"
          echo "Registered API TD: $NEW_TD_ARN"

      # -------------------------------------------------------------------------
      # Update the API ECS service to the new task definition revision.
      # ECS performs a rolling replacement; the circuit-breaker rolls back
      # automatically if the new revision fails to reach steady state.
      # Waits up to 15 minutes using a manual polling loop (aws ecs wait
      # services-stable has a hard 10-minute ceiling).
      # -------------------------------------------------------------------------
      - name: Deploy new task definition to ECS
        if: inputs.service == 'both' || inputs.service == 'backend'
        env:
          CLUSTER:    ${{ steps.tf_outputs.outputs.ecs_cluster }}
          SERVICE:    ${{ steps.tf_outputs.outputs.ecs_service }}
          NEW_TD_ARN: ${{ steps.register_td.outputs.new_td_arn }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TD_ARN" \
            --output json \
            --query "{serviceName: service.serviceName, status: service.status, desiredCount: service.desiredCount}" \
            | cat

          echo "Waiting for service to reach steady state (up to 15 minutes)..."
          for i in $(seq 1 60); do
            SERVICE_INFO=$(aws ecs describe-services \
              --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0]' --output json)
            DEPLOYMENTS=$(echo "$SERVICE_INFO" | jq '.deployments | length')
            RUNNING=$(echo  "$SERVICE_INFO" | jq '.runningCount')
            PENDING=$(echo  "$SERVICE_INFO" | jq '.pendingCount')
            DESIRED=$(echo  "$SERVICE_INFO" | jq '.desiredCount')
            ROLLOUT=$(echo  "$SERVICE_INFO" | jq -r '.deployments[0].rolloutState')

            if [ "$ROLLOUT" = "FAILED" ]; then
              echo "ERROR: Deployment failed (rolloutState=FAILED). ECS circuit-breaker has rolled back. Check ECS events and CloudWatch logs."
              exit 1
            fi

            if [ "$DEPLOYMENTS" -eq 1 ] && [ "$RUNNING" -eq "$DESIRED" ] && [ "$PENDING" -eq 0 ] && [ "$DESIRED" -gt 0 ]; then
              echo "Deployment complete — service is stable ($RUNNING/$DESIRED tasks running)."
              break
            fi

            if [ "$i" -eq 60 ]; then
              echo "ERROR: Service did not stabilize after 15 minutes (deployments: $DEPLOYMENTS, running: $RUNNING, pending: $PENDING, desired: $DESIRED)."
              exit 1
            fi

            echo "[$i/60] Deployments: $DEPLOYMENTS — running: $RUNNING, pending: $PENDING, desired: $DESIRED, rollout: $ROLLOUT — retrying in 15s..."
            sleep 15
          done

      # -------------------------------------------------------------------------
      # Deploy the worker service after the API is stable. Worker uses the same
      # image; deploying it second ensures the API is healthy before the worker
      # starts processing jobs against it.
      # -------------------------------------------------------------------------
      - name: Register Worker task definition
        id: register_worker_td
        if: inputs.service == 'both' || inputs.service == 'worker'
        env:
          IMAGE_SHA: ${{ steps.build.outputs.image }}
        run: |
          TASK_FAMILY="${{ secrets.APP_NAME }}-worker-${{ inputs.environment }}"

          # Guard: the worker task family only exists after Terraform has been applied.
          # Skip worker deploy gracefully on first run so the API deploy is not blocked.
          if ! aws ecs describe-task-definition --task-definition "$TASK_FAMILY" &>/dev/null; then
            echo "WARNING: Worker task definition '$TASK_FAMILY' not found in ECS."
            echo "Apply the Terraform workflow first to create the worker ECS service."
            echo "Skipping worker deploy — API deploy will continue."
            echo "new_worker_td_arn=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TD=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' --output json)

          NEW_TD_JSON=$(echo "$CURRENT_TD" | jq \
            --arg img "$IMAGE_SHA" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
             | .containerDefinitions =
                 [.containerDefinitions[]
                  | if .name == "worker" then .image = $img else . end]')

          NEW_WORKER_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD_JSON" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "new_worker_td_arn=$NEW_WORKER_TD_ARN" >> "$GITHUB_OUTPUT"
          echo "Registered Worker TD: $NEW_WORKER_TD_ARN"

      - name: Deploy Worker task definition to ECS
        if: steps.register_worker_td.outputs.new_worker_td_arn != ''
        env:
          CLUSTER:        ${{ steps.tf_outputs.outputs.ecs_cluster }}
          WORKER_SERVICE: ${{ steps.tf_outputs.outputs.ecs_worker_service }}
          NEW_TD_ARN:     ${{ steps.register_worker_td.outputs.new_worker_td_arn }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$WORKER_SERVICE" \
            --task-definition "$NEW_TD_ARN" \
            --output json \
            --query "{serviceName: service.serviceName, status: service.status}" \
            | cat

          echo "Waiting for worker service to reach steady state (up to 15 minutes)..."
          for i in $(seq 1 60); do
            SERVICE_INFO=$(aws ecs describe-services \
              --cluster "$CLUSTER" --services "$WORKER_SERVICE" \
              --query 'services[0]' --output json)
            DEPLOYMENTS=$(echo "$SERVICE_INFO" | jq '.deployments | length')
            RUNNING=$(echo  "$SERVICE_INFO" | jq '.runningCount')
            PENDING=$(echo  "$SERVICE_INFO" | jq '.pendingCount')
            DESIRED=$(echo  "$SERVICE_INFO" | jq '.desiredCount')
            ROLLOUT=$(echo  "$SERVICE_INFO" | jq -r '.deployments[0].rolloutState')

            if [ "$ROLLOUT" = "FAILED" ]; then
              echo "ERROR: Worker deployment failed (rolloutState=FAILED). ECS circuit-breaker has rolled back. Check ECS events and CloudWatch logs."
              exit 1
            fi

            if [ "$DEPLOYMENTS" -eq 1 ] && [ "$RUNNING" -eq "$DESIRED" ] && [ "$PENDING" -eq 0 ] && [ "$DESIRED" -gt 0 ]; then
              echo "Worker deployment complete — service is stable ($RUNNING/$DESIRED tasks running)."
              break
            fi

            if [ "$i" -eq 60 ]; then
              echo "ERROR: Worker service did not stabilize after 15 minutes (deployments: $DEPLOYMENTS, running: $RUNNING, pending: $PENDING, desired: $DESIRED)."
              exit 1
            fi

            echo "[$i/60] Worker deployments: $DEPLOYMENTS — running: $RUNNING, pending: $PENDING, desired: $DESIRED, rollout: $ROLLOUT — retrying in 15s..."
            sleep 15
          done
