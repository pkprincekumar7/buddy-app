name: Deploy
run-name: Deploy (${{ inputs.environment }}, ${{ inputs.aws_region }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
        type: choice
        options:
          - ap-south-1

permissions:
  id-token: write

concurrency:
  group: deploy-buddy360-${{ inputs.environment }}-${{ inputs.aws_region }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Get EC2 Instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=buddy360-ec2" \
              "Name=tag:Environment,Values=${{ inputs.environment }}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running buddy360-ec2 instance found."
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      # Secrets are received via env: so special characters (quotes, backslashes, $) cannot
      # corrupt the shell command or JSON payload. The resulting .env is base64-encoded so
      # only [A-Za-z0-9+/=] is embedded in the SSM parameters JSON.
      - name: Build .env
        id: dotenv
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          {
            printf 'JWT_SECRET=%s\n'           "$JWT_SECRET"
            printf 'GOOGLE_CLIENT_ID=%s\n'     "$GOOGLE_CLIENT_ID"
            printf 'VITE_GOOGLE_CLIENT_ID=%s\n' "$VITE_GOOGLE_CLIENT_ID"
            printf 'OPENAI_API_KEY=%s\n'       "$OPENAI_API_KEY"
            printf 'OPENAI_MODEL=%s\n'         "$OPENAI_MODEL"
            printf 'ANTHROPIC_API_KEY=%s\n'    "$ANTHROPIC_API_KEY"
            printf 'ANTHROPIC_MODEL=%s\n'      "$ANTHROPIC_MODEL"
            printf 'GEMINI_API_KEY=%s\n'       "$GEMINI_API_KEY"
            printf 'GEMINI_MODEL=%s\n'         "$GEMINI_MODEL"
            printf 'CORS_ORIGINS=%s\n'         "$CORS_ORIGINS"
            printf 'POSTGRES_HOST=%s\n'        "$POSTGRES_HOST"
            printf 'POSTGRES_PORT=5432\n'
            printf 'POSTGRES_USER=%s\n'        "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n'    "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n'          "$POSTGRES_DB"
          } | base64 -w 0 > /tmp/dotenv_b64
          echo "b64=$(cat /tmp/dotenv_b64)" >> $GITHUB_OUTPUT
          echo "pat_b64=$(echo -n "$GH_PAT" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "set -e",
              "GH_PAT=$(echo ${{ steps.dotenv.outputs.pat_b64 }} | base64 -d)",
              "if [ ! -d /home/ubuntu/${{ secrets.GH_REPO_NAME }} ]; then sudo -u ubuntu git clone \"https://oauth2:${GH_PAT}@github.com/${{ secrets.GH_REPO_OWNER }}/${{ secrets.GH_REPO_NAME }}.git\" /home/ubuntu/${{ secrets.GH_REPO_NAME }}; else sudo -u ubuntu git -C /home/ubuntu/${{ secrets.GH_REPO_NAME }} remote set-url origin \"https://oauth2:${GH_PAT}@github.com/${{ secrets.GH_REPO_OWNER }}/${{ secrets.GH_REPO_NAME }}.git\" && sudo -u ubuntu git -C /home/ubuntu/${{ secrets.GH_REPO_NAME }} pull; fi",
              "echo ${{ steps.dotenv.outputs.b64 }} | base64 -d > /home/ubuntu/${{ secrets.GH_REPO_NAME }}/.env",
              "chmod 600 /home/ubuntu/${{ secrets.GH_REPO_NAME }}/.env",
              "cd /home/ubuntu/${{ secrets.GH_REPO_NAME }} && docker compose down && docker compose up --build -d"
            ]}' \
            --output text \
            --query "Command.CommandId")
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for deployment to complete
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "${{ steps.ec2.outputs.instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] Status: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut) exit 1 ;;
            esac
            sleep 10
          done
          echo "Timed out after 10 minutes waiting for deployment."
          exit 1

      - name: Show deployment output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --output json \
            --query "{Status: Status, Output: StandardOutputContent, Error: StandardErrorContent}"
