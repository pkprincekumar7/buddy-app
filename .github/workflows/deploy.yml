name: Deploy
run-name: Deploy (${{ inputs.environment }}, ${{ inputs.aws_region }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
        type: choice
        options:
          - ap-south-1

permissions:
  id-token: write

concurrency:
  group: deploy-buddy-${{ inputs.environment }}-${{ inputs.aws_region }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Get EC2 Instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=buddy-ec2" \
              "Name=tag:Environment,Values=${{ inputs.environment }}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running buddy-ec2 instance found."
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "set -e",
              "if [ ! -d /home/ubuntu/buddy-app ]; then sudo -u ubuntu git clone https://github.com/pkprincekumar7/buddy-app.git /home/ubuntu/buddy-app; else sudo -u ubuntu git -C /home/ubuntu/buddy-app pull; fi",
              "printf \"JWT_SECRET=${{ secrets.JWT_SECRET }}\nGOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}\nOPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}\nOPENAI_MODEL=${{ secrets.OPENAI_MODEL }}\nCORS_ORIGINS=${{ secrets.CORS_ORIGINS }}\nVITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}\nANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}\nANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL }}\nGEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}\nGEMINI_MODEL=${{ secrets.GEMINI_MODEL }}\n\" > /home/ubuntu/buddy-app/.env",
              "chmod 600 /home/ubuntu/buddy-app/.env",
              "cd /home/ubuntu/buddy-app && docker compose down && docker compose up --build -d"
            ]}' \
            --output text \
            --query "Command.CommandId")
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for deployment to complete
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "${{ steps.ec2.outputs.instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] Status: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut) exit 1 ;;
            esac
            sleep 10
          done
          echo "Timed out after 10 minutes waiting for deployment."
          exit 1

      - name: Show deployment output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --output json \
            --query "{Status: Status, Output: StandardOutputContent, Error: StandardErrorContent}"
