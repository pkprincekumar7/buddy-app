name: Terraform Live Backend
run-name: Terraform Live Backend (${{ inputs.action }}, ${{ inputs.environment }}, ${{ inputs.aws_region }})

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action: plan, apply, plan-destroy, destroy"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
        type: choice
        # Multi-region expansion: add the new region here, add an ACM cert case
        # entry in the "Resolve ACM certificate ARN" step, and follow the full
        # checklist in infra-live-backend/terraform/variables.tf.
        options:
          - ap-south-1
  workflow_call:
    inputs:
      action:
        type: string
        required: true
      environment:
        type: string
        required: true
      aws_region:
        type: string
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-live-backend-buddy360-${{ inputs.environment }}-${{ inputs.aws_region }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VERSION: "1.13.0"
  TF_VAR_aws_region: ${{ inputs.aws_region }}
  TF_VAR_environment: ${{ inputs.environment }}

jobs:
  terraform:
    name: Terraform Live Backend ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra-live-backend/terraform
    env:
      TF_IN_AUTOMATION: "1"
      # Resolved from GitHub Environment Secrets so dev/stg/prod each use their own values.
      TF_VAR_subdomain_internal: ${{ secrets.SUBDOMAIN_INTERNAL }}
      TF_VAR_domain_name:        ${{ secrets.DOMAIN_NAME }}
      TF_VAR_hosted_zone_id:     ${{ secrets.HOSTED_ZONE_ID }}
      TF_VAR_cors_origins:       ${{ secrets.CORS_ORIGINS }}
      TF_VAR_cookie_domain:      ${{ secrets.COOKIE_DOMAIN }}
      # TF_VAR_acm_certificate_arn is resolved per-region in the
      # "Resolve ACM certificate ARN" step below and exported to GITHUB_ENV.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # Validate required secrets first — pure bash, no AWS calls needed —
      # so the workflow fails with a clear message before touching AWS if any
      # secret is missing, regardless of action (plan, apply, destroy, etc.).
      # -------------------------------------------------------------------------
      - name: Validate required secrets
        env:
          ROLE_ARN:                    ${{ secrets.ROLE_ARN }}
          APP_NAME:                    ${{ secrets.APP_NAME }}
          STATE_BUCKET:                ${{ secrets.STATE_BUCKET }}
          ACM_CERTIFICATE_ARN_AP_SOUTH_1: ${{ secrets.ACM_CERTIFICATE_ARN_AP_SOUTH_1 }}
          SUBDOMAIN_INTERNAL:          ${{ secrets.SUBDOMAIN_INTERNAL }}
          DOMAIN_NAME:                 ${{ secrets.DOMAIN_NAME }}
          HOSTED_ZONE_ID:              ${{ secrets.HOSTED_ZONE_ID }}
          CORS_ORIGINS:                ${{ secrets.CORS_ORIGINS }}
          COOKIE_DOMAIN:               ${{ secrets.COOKIE_DOMAIN }}
          JWT_SECRET:                  ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID:            ${{ secrets.GOOGLE_CLIENT_ID }}
          MONGODB_URI:                 ${{ secrets.MONGODB_URI }}
          OPENAI_MODEL:                ${{ secrets.OPENAI_MODEL }}
          OPENAI_API_KEY:              ${{ secrets.OPENAI_API_KEY }}
        run: |
          missing=()
          [[ -z "$ROLE_ARN"                       ]] && missing+=("ROLE_ARN")
          [[ -z "$APP_NAME"                       ]] && missing+=("APP_NAME")
          [[ -z "$STATE_BUCKET"                   ]] && missing+=("STATE_BUCKET")
          [[ "${{ inputs.aws_region }}" == "ap-south-1" && -z "$ACM_CERTIFICATE_ARN_AP_SOUTH_1" ]] && missing+=("ACM_CERTIFICATE_ARN_AP_SOUTH_1")
          [[ -z "$SUBDOMAIN_INTERNAL"             ]] && missing+=("SUBDOMAIN_INTERNAL")
          [[ -z "$DOMAIN_NAME"                    ]] && missing+=("DOMAIN_NAME")
          [[ -z "$HOSTED_ZONE_ID"                 ]] && missing+=("HOSTED_ZONE_ID")
          [[ -z "$CORS_ORIGINS"                   ]] && missing+=("CORS_ORIGINS")
          [[ -z "$COOKIE_DOMAIN"                  ]] && missing+=("COOKIE_DOMAIN")
          [[ -z "$JWT_SECRET"                     ]] && missing+=("JWT_SECRET")
          [[ -z "$GOOGLE_CLIENT_ID"               ]] && missing+=("GOOGLE_CLIENT_ID")
          [[ -z "$MONGODB_URI"                    ]] && missing+=("MONGODB_URI")
          [[ -z "$OPENAI_MODEL"                   ]] && missing+=("OPENAI_MODEL")
          [[ -z "$OPENAI_API_KEY"                 ]] && missing+=("OPENAI_API_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Required GitHub environment secrets are not set: ${missing[*]}"
            echo "Add them to the '${{ inputs.environment }}' GitHub environment and re-run."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          role-session-name: terraform-live-backend-${{ inputs.environment }}
          aws-region: ${{ inputs.aws_region }}

      # -------------------------------------------------------------------------
      # GitHub Actions does not support dynamic secret references, so the
      # regional ACM certificate ARN is surfaced as an env var and written to
      # GITHUB_ENV as TF_VAR_acm_certificate_arn for all subsequent Terraform
      # steps. Add a new case entry here when expanding to additional regions.
      # -------------------------------------------------------------------------
      - name: Resolve ACM certificate ARN for backend region
        env:
          ACM_ARN_AP_SOUTH_1: ${{ secrets.ACM_CERTIFICATE_ARN_AP_SOUTH_1 }}
        run: |
          case "${{ inputs.aws_region }}" in
            ap-south-1) echo "TF_VAR_acm_certificate_arn=$ACM_ARN_AP_SOUTH_1" >> "$GITHUB_ENV" ;;
            *) echo "ERROR: No ACM certificate configured for region '${{ inputs.aws_region }}'. Add the secret and a case entry to this workflow."; exit 1 ;;
          esac

      # -------------------------------------------------------------------------
      # Model overrides via GitHub Environment Secrets.
      # OPENAI_MODEL is required (validated above). ANTHROPIC_MODEL and
      # GEMINI_MODEL are optional — when not set, Terraform falls back to the
      # tfvars default for that environment.
      # -------------------------------------------------------------------------
      - name: Resolve optional model overrides
        env:
          OPENAI_MODEL:    ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          GEMINI_MODEL:    ${{ secrets.GEMINI_MODEL }}
        run: |
          [[ -n "$OPENAI_MODEL"    ]] && echo "TF_VAR_openai_model=$OPENAI_MODEL"       >> "$GITHUB_ENV"
          [[ -n "$ANTHROPIC_MODEL" ]] && echo "TF_VAR_anthropic_model=$ANTHROPIC_MODEL" >> "$GITHUB_ENV"
          [[ -n "$GEMINI_MODEL"    ]] && echo "TF_VAR_gemini_model=$GEMINI_MODEL"       >> "$GITHUB_ENV"
          true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.STATE_BUCKET }}" \
            -backend-config="key=terraform-state-files/${{ secrets.APP_NAME }}/${{ inputs.environment }}/backend/${{ inputs.aws_region }}/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Show plan summary
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          {
            echo "### Terraform Plan — backend / ${{ inputs.environment }} / ${{ inputs.aws_region }}"
            echo '```'
            terraform show -no-color tfplan.bin
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artefact
        if: inputs.action == 'plan' || inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-backend-${{ inputs.environment }}-${{ inputs.aws_region }}
          path: infra-live-backend/terraform/tfplan.bin
          retention-days: 7

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan.bin

      # -------------------------------------------------------------------------
      # Populate the Secrets Manager app secret from GitHub environment secrets.
      # JWT_SECRET, GOOGLE_CLIENT_ID, and MONGODB_URI are required (validated above).
      # Optional LLM keys fall back to REPLACE_ME so the app starts even if a
      # provider isn't configured yet.
      # Uses jq to build JSON safely — handles special characters in secret values.
      # This runs every apply so rotating a GitHub secret takes effect on next deploy.
      # -------------------------------------------------------------------------
      - name: Populate app secrets
        if: inputs.action == 'apply'
        env:
          JWT_SECRET:        ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID:  ${{ secrets.GOOGLE_CLIENT_ID }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          MONGODB_URI:       ${{ secrets.MONGODB_URI }}
        run: |
          SECRET_ARN=$(terraform output -raw app_secret_arn)
          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_ARN" \
            --secret-string "$(jq -n \
              --arg jwt    "$JWT_SECRET" \
              --arg gid    "$GOOGLE_CLIENT_ID" \
              --arg openai "$OPENAI_API_KEY" \
              --arg anthro "${ANTHROPIC_API_KEY:-REPLACE_ME}" \
              --arg gemini "${GEMINI_API_KEY:-REPLACE_ME}" \
              --arg mongo  "$MONGODB_URI" \
              '{JWT_SECRET: $jwt, GOOGLE_CLIENT_ID: $gid, OPENAI_API_KEY: $openai, ANTHROPIC_API_KEY: $anthro, GEMINI_API_KEY: $gemini, MONGODB_URI: $mongo}')"
          echo "App secrets populated in Secrets Manager."

      - name: Terraform Plan (destroy)
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: terraform plan -destroy -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Show destroy plan summary
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: |
          {
            echo "### Terraform Destroy Plan — backend / ${{ inputs.environment }} / ${{ inputs.aws_region }}"
            echo '```'
            terraform show -no-color tfplan.bin
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload destroy plan artefact
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-backend-destroy-${{ inputs.environment }}-${{ inputs.aws_region }}
          path: infra-live-backend/terraform/tfplan.bin
          retention-days: 7

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform apply -auto-approve tfplan.bin
