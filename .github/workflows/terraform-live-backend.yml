name: Terraform Live Backend
run-name: Terraform Live Backend (${{ inputs.action }}, ${{ inputs.environment }}, ${{ inputs.aws_region }})

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action: plan, apply, plan-destroy, destroy"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - sbx
          - stg
          - prod
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
        type: choice
        # Multi-region expansion: add the new region here, add an ACM cert case
        # entry in the "Resolve ACM certificate ARN" step, and follow the full
        # checklist in infra-live-backend/terraform/variables.tf.
        options:
          - ap-south-1
  workflow_call:
    inputs:
      action:
        type: string
        required: true
      environment:
        type: string
        required: true
      aws_region:
        type: string
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-live-backend-buddy360-${{ inputs.environment }}-${{ inputs.aws_region }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VERSION: "1.13.0"
  TF_VAR_aws_region: ${{ inputs.aws_region }}
  TF_VAR_environment: ${{ inputs.environment }}

jobs:
  terraform:
    name: Terraform Live Backend ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra-live-backend/terraform
    env:
      TF_IN_AUTOMATION: "1"
      # Resolved from GitHub Environment Secrets so dev/stg/prod each use their own values.
      TF_VAR_app_name:            ${{ secrets.APP_NAME }}
      TF_VAR_mongodb_db_name:     ${{ secrets.APP_NAME }}-${{ inputs.environment }}
      TF_VAR_domain_name:         ${{ secrets.DOMAIN_NAME }}
      TF_VAR_hosted_zone_id:      ${{ secrets.HOSTED_ZONE_ID }}
      TF_VAR_assets_bucket_name: ${{ secrets.ASSETS_BUCKET_NAME }}
      # TF_VAR_acm_certificate_arn is resolved per-region in the
      # "Resolve ACM certificate ARN" step below and exported to GITHUB_ENV.
      # TF_VAR_subdomain_internal, TF_VAR_cookie_domain, and TF_VAR_cors_origins
      # are all derived from SUBDOMAIN + environment + DOMAIN_NAME in the
      # "Resolve derived values" step below and exported to GITHUB_ENV.

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # -------------------------------------------------------------------------
      # Validate required secrets first — pure bash, no AWS calls needed —
      # so the workflow fails with a clear message before touching AWS if any
      # secret is missing, regardless of action (plan, apply, destroy, etc.).
      # ANTHROPIC_API_KEY and GEMINI_API_KEY are intentionally omitted — they
      # are optional integrations. If absent, the Secrets Manager init step
      # writes REPLACE_ME placeholders which can be updated manually later.
      # -------------------------------------------------------------------------
      - name: Validate required secrets
        env:
          ROLE_ARN:                       ${{ secrets.ROLE_ARN }}
          APP_NAME:                       ${{ secrets.APP_NAME }}
          STATE_BUCKET:                   ${{ secrets.STATE_BUCKET }}
          ACM_CERTIFICATE_ARN_AP_SOUTH_1: ${{ secrets.ACM_CERTIFICATE_ARN_AP_SOUTH_1 }}
          SUBDOMAIN:                      ${{ secrets.SUBDOMAIN }}
          DOMAIN_NAME:                    ${{ secrets.DOMAIN_NAME }}
          HOSTED_ZONE_ID:                 ${{ secrets.HOSTED_ZONE_ID }}
          ASSETS_BUCKET_NAME:            ${{ secrets.ASSETS_BUCKET_NAME }}
          JWT_PRIVATE_KEY:                ${{ secrets.JWT_PRIVATE_KEY }}
          GOOGLE_CLIENT_ID:               ${{ secrets.GOOGLE_CLIENT_ID }}
          MONGODB_URI:                    ${{ secrets.MONGODB_URI }}
          OPENAI_API_KEY:                 ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:                   ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_MODEL:                ${{ secrets.ANTHROPIC_MODEL }}
          GEMINI_MODEL:                   ${{ secrets.GEMINI_MODEL }}
          REDIS_AUTH_TOKEN:               ${{ secrets.REDIS_AUTH_TOKEN }}
        run: |
          missing=()
          [[ -z "$ROLE_ARN"                       ]] && missing+=("ROLE_ARN")
          [[ -z "$APP_NAME"                       ]] && missing+=("APP_NAME")
          [[ -z "$STATE_BUCKET"                   ]] && missing+=("STATE_BUCKET")
          [[ "${{ inputs.aws_region }}" == "ap-south-1" && -z "$ACM_CERTIFICATE_ARN_AP_SOUTH_1" ]] && missing+=("ACM_CERTIFICATE_ARN_AP_SOUTH_1")
          [[ -z "$SUBDOMAIN"                      ]] && missing+=("SUBDOMAIN")
          [[ -z "$DOMAIN_NAME"                    ]] && missing+=("DOMAIN_NAME")
          [[ -z "$HOSTED_ZONE_ID"                 ]] && missing+=("HOSTED_ZONE_ID")
          [[ -z "$ASSETS_BUCKET_NAME"            ]] && missing+=("ASSETS_BUCKET_NAME")
          [[ -z "$JWT_PRIVATE_KEY"                ]] && missing+=("JWT_PRIVATE_KEY")
          [[ -z "$GOOGLE_CLIENT_ID"               ]] && missing+=("GOOGLE_CLIENT_ID")
          [[ -z "$MONGODB_URI"                    ]] && missing+=("MONGODB_URI")
          [[ -z "$OPENAI_API_KEY"                 ]] && missing+=("OPENAI_API_KEY")
          [[ -z "$OPENAI_MODEL"                   ]] && missing+=("OPENAI_MODEL")
          [[ -z "$ANTHROPIC_MODEL"                ]] && missing+=("ANTHROPIC_MODEL")
          [[ -z "$GEMINI_MODEL"                   ]] && missing+=("GEMINI_MODEL")
          [[ -z "$REDIS_AUTH_TOKEN"               ]] && missing+=("REDIS_AUTH_TOKEN")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Required GitHub environment secrets are not set: ${missing[*]}"
            echo "Add them to the '${{ inputs.environment }}' GitHub environment and re-run."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          role-session-name: terraform-live-backend-${{ inputs.environment }}
          aws-region: ${{ inputs.aws_region }}

      # -------------------------------------------------------------------------
      # GitHub Actions does not support dynamic secret references, so the
      # regional ACM certificate ARN is surfaced as an env var and written to
      # GITHUB_ENV as TF_VAR_acm_certificate_arn for all subsequent Terraform
      # steps. Add a new case entry here when expanding to additional regions.
      # -------------------------------------------------------------------------
      - name: Resolve ACM certificate ARN for backend region
        env:
          ACM_ARN_AP_SOUTH_1: ${{ secrets.ACM_CERTIFICATE_ARN_AP_SOUTH_1 }}
        run: |
          case "${{ inputs.aws_region }}" in
            ap-south-1) echo "TF_VAR_acm_certificate_arn=$ACM_ARN_AP_SOUTH_1" >> "$GITHUB_ENV" ;;
            *) echo "ERROR: No ACM certificate configured for region '${{ inputs.aws_region }}'. Add the secret and a case entry to this workflow."; exit 1 ;;
          esac

      # -------------------------------------------------------------------------
      # Several values are derived from SUBDOMAIN + environment + DOMAIN_NAME
      # using the same prod/non-prod FQDN logic as local.fqdn in infra-live-edge:
      #   prod     → {subdomain}.{domain_name}
      #   non-prod → {subdomain}-{environment}.{domain_name}
      #
      # subdomain_internal  — internal ALB prefix: SUBDOMAIN + "-internal"
      # cookie_domain       — public CloudFront FQDN (browser cookie scope)
      # cors_origins        — allowed browser origin: https://{fqdn}
      #
      # None of these need to be maintained as separate GitHub secrets.
      # -------------------------------------------------------------------------
      - name: Resolve derived values
        env:
          SUBDOMAIN:   ${{ secrets.SUBDOMAIN }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          echo "TF_VAR_subdomain_internal=${SUBDOMAIN}-internal" >> "$GITHUB_ENV"
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            FQDN="${SUBDOMAIN}.${DOMAIN_NAME}"
          else
            FQDN="${SUBDOMAIN}-${{ inputs.environment }}.${DOMAIN_NAME}"
          fi
          echo "TF_VAR_cookie_domain=${FQDN}"          >> "$GITHUB_ENV"
          echo "TF_VAR_cors_origins=https://${FQDN}"   >> "$GITHUB_ENV"

      # -------------------------------------------------------------------------
      # Export AI model identifiers from GitHub Environment Secrets.
      # All three are required (validated above) — model names are non-sensitive
      # config that may differ per environment, so they live as secrets rather
      # than tfvars to allow changes without a code commit.
      # -------------------------------------------------------------------------
      - name: Resolve model variables
        env:
          OPENAI_MODEL:    ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          GEMINI_MODEL:    ${{ secrets.GEMINI_MODEL }}
        run: |
          echo "TF_VAR_openai_model=$OPENAI_MODEL"       >> "$GITHUB_ENV"
          echo "TF_VAR_anthropic_model=$ANTHROPIC_MODEL" >> "$GITHUB_ENV"
          echo "TF_VAR_gemini_model=$GEMINI_MODEL"       >> "$GITHUB_ENV"

      - name: Resolve Redis auth token
        env:
          REDIS_AUTH_TOKEN: ${{ secrets.REDIS_AUTH_TOKEN }}
        run: |
          echo "TF_VAR_redis_auth_token=$REDIS_AUTH_TOKEN" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.STATE_BUCKET }}" \
            -backend-config="key=terraform-state-files/${{ secrets.APP_NAME }}/${{ inputs.environment }}/backend/${{ inputs.aws_region }}/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Show plan summary
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          {
            echo "### Terraform Plan — backend / ${{ inputs.environment }} / ${{ inputs.aws_region }}"
            echo '```'
            terraform show -no-color tfplan.bin
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artefact
        if: inputs.action == 'plan' || inputs.action == 'apply'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tfplan-backend-${{ inputs.environment }}-${{ inputs.aws_region }}
          path: infra-live-backend/terraform/tfplan.bin
          retention-days: 7

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan.bin

      # -------------------------------------------------------------------------
      # Initialise the Secrets Manager app secret on first apply only.
      # Reads the current secret and skips the update if all required keys already
      # contain real values (i.e. are not the REPLACE_ME placeholder written by
      # Terraform on resource creation). This prevents every apply from overwriting
      # secrets that were rotated manually outside of Terraform.
      # To update secrets after initial setup, use aws secretsmanager put-secret-value
      # directly (see README_LIVE.md — Secrets Manager section).
      # -------------------------------------------------------------------------
      - name: Initialise app secrets (first apply only)
        if: inputs.action == 'apply'
        env:
          JWT_PRIVATE_KEY:   ${{ secrets.JWT_PRIVATE_KEY }}
          GOOGLE_CLIENT_ID:  ${{ secrets.GOOGLE_CLIENT_ID }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          MONGODB_URI:       ${{ secrets.MONGODB_URI }}
          REDIS_AUTH_TOKEN:  ${{ secrets.REDIS_AUTH_TOKEN }}
        run: |
          SECRET_ARN=$(terraform output -raw app_secret_arn)

          # Fetch current secret to check whether required keys are still placeholders
          CURRENT=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_ARN" \
            --query SecretString \
            --output text 2>/dev/null || echo '{"JWT_PRIVATE_KEY":"REPLACE_ME"}')

          NEEDS_INIT=$(echo "$CURRENT" | jq -r '
            if (.JWT_PRIVATE_KEY == "REPLACE_ME") or
               (.GOOGLE_CLIENT_ID == "REPLACE_ME") or
               (.OPENAI_API_KEY == "REPLACE_ME") or
               (.MONGODB_URI == "REPLACE_ME") or
               (.REDIS_AUTH_TOKEN == "REPLACE_ME")
            then "true" else "false" end
          ')

          if [[ "$NEEDS_INIT" == "true" ]]; then
            echo "Placeholder values detected — initialising Secrets Manager..."
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_ARN" \
              --secret-string "$(jq -n \
                --arg jwt    "$JWT_PRIVATE_KEY" \
                --arg gid    "$GOOGLE_CLIENT_ID" \
                --arg openai "$OPENAI_API_KEY" \
                --arg anthro "${ANTHROPIC_API_KEY:-REPLACE_ME}" \
                --arg gemini "${GEMINI_API_KEY:-REPLACE_ME}" \
                --arg mongo  "$MONGODB_URI" \
                --arg redis  "$REDIS_AUTH_TOKEN" \
                '{JWT_PRIVATE_KEY: $jwt, GOOGLE_CLIENT_ID: $gid, OPENAI_API_KEY: $openai, ANTHROPIC_API_KEY: $anthro, GEMINI_API_KEY: $gemini, MONGODB_URI: $mongo, REDIS_AUTH_TOKEN: $redis}')"
            echo "App secrets initialised in Secrets Manager."
          else
            echo "Secrets Manager already contains real values — skipping automatic update. Rotate manually if needed."
          fi

      - name: Terraform Plan (destroy)
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: terraform plan -destroy -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Show destroy plan summary
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: |
          {
            echo "### Terraform Destroy Plan — backend / ${{ inputs.environment }} / ${{ inputs.aws_region }}"
            echo '```'
            terraform show -no-color tfplan.bin
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload destroy plan artefact
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tfplan-backend-destroy-${{ inputs.environment }}-${{ inputs.aws_region }}
          path: infra-live-backend/terraform/tfplan.bin
          retention-days: 7

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform apply -auto-approve tfplan.bin
