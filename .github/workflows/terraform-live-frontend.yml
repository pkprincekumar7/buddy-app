name: Terraform Live Frontend
run-name: Terraform Live Frontend (${{ inputs.action }}, ${{ inputs.environment }}, ${{ inputs.aws_region }})

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action: plan, apply, plan-destroy, destroy"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod
      aws_region:
        description: "AWS region (for S3 bucket; WAF and CloudFront are always us-east-1 / global)"
        required: true
        default: "ap-south-1"
        type: choice
        options:
          - ap-south-1

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-live-frontend-${{ secrets.APP_NAME }}-${{ inputs.environment }}-${{ inputs.aws_region }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VERSION: "1.13.0"
  TF_VAR_aws_region:  ${{ inputs.aws_region }}
  TF_VAR_environment: ${{ inputs.environment }}

jobs:
  terraform:
    name: Terraform Live Frontend ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra-live-frontend/terraform
    env:
      TF_IN_AUTOMATION: "1"
      # These reference secrets.* and must be at job level so GitHub resolves
      # environment secrets (scoped to dev/stg/prod) in addition to repo secrets.
      TF_VAR_state_bucket:                  ${{ secrets.STATE_BUCKET }}
      TF_VAR_domain_name:                   ${{ secrets.DOMAIN_NAME }}
      TF_VAR_subdomain:                     ${{ secrets.SUBDOMAIN }}
      TF_VAR_hosted_zone_id:                ${{ secrets.HOSTED_ZONE_ID }}
      TF_VAR_acm_certificate_arn_us_east_1: ${{ secrets.ACM_CERTIFICATE_ARN_US_EAST_1 }}
      TF_VAR_app_state_key: "terraform-state-files/${{ secrets.APP_NAME }}/${{ inputs.environment }}/backend/${{ inputs.aws_region }}/terraform.tfstate"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          role-session-name: terraform-live-frontend-${{ inputs.environment }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.STATE_BUCKET }}" \
            -backend-config="key=terraform-state-files/${{ secrets.APP_NAME }}/${{ inputs.environment }}/frontend/${{ inputs.aws_region }}/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan.bin

      # -------------------------------------------------------------------------
      # Publish key outputs to SSM Parameter Store (Standard tier, free).
      # deploy-live-frontend.yml reads these so no manual secret copying is needed.
      # -------------------------------------------------------------------------
      - name: Publish outputs to SSM
        if: inputs.action == 'apply'
        run: |
          put() {
            aws ssm put-parameter \
              --name "$1" --value "$2" \
              --type String --overwrite \
              --region "${{ inputs.aws_region }}" \
              > /dev/null
            echo "  $1"
          }
          echo "Writing SSM parameters..."
          put "/${{ secrets.APP_NAME }}/${{ inputs.environment }}/frontend/s3_bucket_name" \
              "$(terraform output -raw s3_bucket_name)"
          put "/${{ secrets.APP_NAME }}/${{ inputs.environment }}/frontend/cloudfront_distribution_id" \
              "$(terraform output -raw cloudfront_distribution_id)"
          echo "Done."

      - name: Terraform Plan (destroy)
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: terraform plan -destroy -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform apply -auto-approve tfplan.bin
