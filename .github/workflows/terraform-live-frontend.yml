name: Terraform Live Frontend
run-name: Terraform Live Frontend (${{ inputs.action }}, ${{ inputs.environment }})

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action: plan, apply, plan-destroy, destroy"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod
  workflow_call:
    inputs:
      action:
        type: string
        required: true
      environment:
        type: string
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-live-frontend-buddy360-${{ inputs.environment }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VERSION: "1.13.0"
  TF_VAR_environment: ${{ inputs.environment }}
  # No TF_VAR_aws_region — the module has no aws_region variable.
  # All resources are hardcoded to us-east-1 (S3 bucket policy, SSM reads).

jobs:
  terraform:
    name: Terraform Live Frontend ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra-live-frontend/terraform
    env:
      TF_IN_AUTOMATION: "1"
      TF_VAR_app_name:             ${{ secrets.APP_NAME }}
      TF_VAR_frontend_bucket_name: ${{ secrets.FRONTEND_BUCKET_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate required secrets
        env:
          ROLE_ARN:             ${{ secrets.ROLE_ARN }}
          APP_NAME:             ${{ secrets.APP_NAME }}
          STATE_BUCKET:         ${{ secrets.STATE_BUCKET }}
          FRONTEND_BUCKET_NAME: ${{ secrets.FRONTEND_BUCKET_NAME }}
        run: |
          missing=()
          [[ -z "$ROLE_ARN"             ]] && missing+=("ROLE_ARN")
          [[ -z "$APP_NAME"             ]] && missing+=("APP_NAME")
          [[ -z "$STATE_BUCKET"         ]] && missing+=("STATE_BUCKET")
          [[ -z "$FRONTEND_BUCKET_NAME" ]] && missing+=("FRONTEND_BUCKET_NAME")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Required GitHub environment secrets are not set: ${missing[*]}"
            echo "Add them to the '${{ inputs.environment }}' GitHub environment and re-run."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          role-session-name: terraform-live-frontend-${{ inputs.environment }}
          # All resources in this module are in us-east-1.
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Verify SSM parameters exist and are readable
        run: |
          check_ssm() {
            local name="$1"
            local value
            value=$(aws ssm get-parameter --region us-east-1 --name "$name" --query "Parameter.Value" --output text 2>&1)
            if [[ $? -ne 0 ]]; then
              echo "ERROR: Cannot read SSM parameter '$name': $value"
              echo "Ensure infra-live-edge has been applied and the IAM role has ssm:GetParameter on this path."
              return 1
            fi
            echo "OK: $name"
          }
          APP="${{ secrets.APP_NAME }}"
          ENV="${{ inputs.environment }}"
          check_ssm "/$APP/$ENV/edge/cloudfront_arn"
          check_ssm "/$APP/$ENV/edge/s3_bucket_name"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.STATE_BUCKET }}" \
            -backend-config="key=terraform-state-files/${{ secrets.APP_NAME }}/${{ inputs.environment }}/frontend/us-east-1/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Show plan summary
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          {
            echo "### Terraform Plan — frontend / ${{ inputs.environment }}"
            echo '```'
            terraform show -no-color tfplan.bin
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artefact
        if: inputs.action == 'plan' || inputs.action == 'apply'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tfplan-frontend-${{ inputs.environment }}
          path: infra-live-frontend/terraform/tfplan.bin
          retention-days: 7

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan.bin

      - name: Terraform Plan (destroy)
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: terraform plan -destroy -out=tfplan.bin -input=false -no-color -var-file=tfvars/${{ inputs.environment }}.tfvars

      - name: Show destroy plan summary
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        run: |
          {
            echo "### Terraform Destroy Plan — frontend / ${{ inputs.environment }}"
            echo '```'
            terraform show -no-color tfplan.bin
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload destroy plan artefact
        if: inputs.action == 'plan-destroy' || inputs.action == 'destroy'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tfplan-frontend-destroy-${{ inputs.environment }}
          path: infra-live-frontend/terraform/tfplan.bin
          retention-days: 7

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform apply -auto-approve tfplan.bin
