name: Build iOS IPA
run-name: Build iOS IPA (${{ inputs.environment }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-ios-ipa-buddy360-${{ inputs.environment }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build iOS IPA
    # iOS builds MUST run on macOS — xcodebuild and codesign are Apple-only tools.
    runs-on: macos-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # -------------------------------------------------------------------------
      # Validate that all required secrets exist in the selected GitHub environment
      # before doing any real work — mirrors the pattern in build-android-apk.yml.
      # -------------------------------------------------------------------------
      - name: Validate required secrets
        env:
          SUBDOMAIN:                      ${{ secrets.SUBDOMAIN }}
          DOMAIN_NAME:                    ${{ secrets.DOMAIN_NAME }}
          GOOGLE_CLIENT_ID:               ${{ secrets.GOOGLE_CLIENT_ID }}
          ROLE_ARN:                       ${{ secrets.ROLE_ARN }}
          BACKEND_BUCKET_NAME:            ${{ secrets.BACKEND_BUCKET_NAME }}
          IOS_CERTIFICATE_P12_BASE64:     ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD:       ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_APPLE_TEAM_ID:              ${{ secrets.IOS_APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -z "$SUBDOMAIN"                       ]] && missing+=("SUBDOMAIN")
          [[ -z "$DOMAIN_NAME"                     ]] && missing+=("DOMAIN_NAME")
          [[ -z "$GOOGLE_CLIENT_ID"                ]] && missing+=("GOOGLE_CLIENT_ID")
          [[ -z "$ROLE_ARN"                        ]] && missing+=("ROLE_ARN")
          [[ -z "$BACKEND_BUCKET_NAME"             ]] && missing+=("BACKEND_BUCKET_NAME")
          [[ -z "$IOS_CERTIFICATE_P12_BASE64"      ]] && missing+=("IOS_CERTIFICATE_P12_BASE64")
          [[ -z "$IOS_CERTIFICATE_PASSWORD"        ]] && missing+=("IOS_CERTIFICATE_PASSWORD")
          [[ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]] && missing+=("IOS_PROVISIONING_PROFILE_BASE64")
          [[ -z "$IOS_APPLE_TEAM_ID"               ]] && missing+=("IOS_APPLE_TEAM_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Required GitHub environment secrets are not set: ${missing[*]}"
            echo "Add them to the '${{ inputs.environment }}' GitHub environment and re-run."
            exit 1
          fi

      # -------------------------------------------------------------------------
      # Derive the CloudFront FQDN — same logic as build-android-apk.yml:
      #   prod  →  {SUBDOMAIN}.{DOMAIN_NAME}
      #   other →  {SUBDOMAIN}-{env}.{DOMAIN_NAME}
      # -------------------------------------------------------------------------
      - name: Resolve CloudFront FQDN
        env:
          SUBDOMAIN:   ${{ secrets.SUBDOMAIN }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            FQDN="${SUBDOMAIN}.${DOMAIN_NAME}"
          else
            FQDN="${SUBDOMAIN}-${{ inputs.environment }}.${DOMAIN_NAME}"
          fi
          echo "FQDN=${FQDN}" >> "$GITHUB_ENV"
          echo "Resolved FQDN: ${FQDN}"

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22.11.0"
          cache: "npm"
          cache-dependency-path: frontend-app/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: frontend-app/node_modules
          key: node-modules-${{ runner.os }}-node22.11.0-${{ hashFiles('frontend-app/package-lock.json') }}

      - name: Install JS dependencies
        working-directory: frontend-app
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      # -------------------------------------------------------------------------
      # Write frontend-app/.env so react-native-config picks up the correct
      # values — identical to the Android workflow.
      # -------------------------------------------------------------------------
      - name: Write .env for react-native-config
        working-directory: frontend-app
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          {
            echo "API_URL=https://${{ env.FQDN }}"
            echo "CDN_BASE_URL=https://${{ env.FQDN }}"
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
          } > .env
          echo "Written .env (secrets masked):"
          sed 's/=.*/=***/' .env

      # -------------------------------------------------------------------------
      # CocoaPods — restore cached Pods to avoid reinstalling on every run.
      # Cache key covers both Podfile.lock (pod versions) and the JS package-lock
      # (native modules change when JS deps change).
      #
      # restore-keys is intentionally omitted: actions/cache only sets cache-hit
      # to 'true' on an exact key match. A partial restore-keys hit returns
      # cache-hit as '' (falsy), so pod install would still run and overwrite the
      # partially restored Pods directory — wasting the restore step. With an
      # exact-only key, a miss means no restore and a clean pod install, which is
      # the correct and predictable behaviour.
      # -------------------------------------------------------------------------
      - name: Cache CocoaPods
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: |
            frontend-app/ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('frontend-app/ios/Podfile.lock', 'frontend-app/package-lock.json') }}

      - name: Install CocoaPods
        working-directory: frontend-app/ios
        if: steps.pods-cache.outputs.cache-hit != 'true'
        run: pod install --repo-update

      # -------------------------------------------------------------------------
      # Cache Xcode DerivedData — significantly speeds up incremental builds.
      # Key covers ios project files and node_modules (native module changes
      # invalidate the build cache).
      # -------------------------------------------------------------------------
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-derived-${{ runner.os }}-${{ hashFiles('frontend-app/ios/**/*.pbxproj', 'frontend-app/ios/Podfile.lock') }}
          restore-keys: xcode-derived-${{ runner.os }}-

      # -------------------------------------------------------------------------
      # Code-signing setup.
      #
      # We create a dedicated temporary keychain (not the default login keychain)
      # so the certificate is isolated to this CI run and automatically cleaned up.
      #
      # Steps:
      #   1. Decode the base64 .p12 → temp file → import into temp keychain.
      #   2. Decode the base64 .mobileprovision → extract its UUID via PlistBuddy
      #      → install to ~/Library/MobileDevice/Provisioning Profiles/<uuid>.mobileprovision
      #      (Xcode looks up profiles by UUID from this directory).
      # -------------------------------------------------------------------------
      - name: Install signing certificate
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD:   ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/buddy-ci.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"
          P12_PATH="$RUNNER_TEMP/certificate.p12"

          # Create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temp keychain to the search list while keeping login.keychain-db intact.
          # Using an explicit name is safer than parsing the current list dynamically.
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Export path for subsequent steps
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          # Extract UUID: decode the CMS-signed profile to a temp plist file first.
          # PlistBuddy requires a real file path — reading from /dev/stdin via <<<
          # is unreliable on macOS GitHub runners.
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")

          PP_DEST="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DEST"
          cp "$PP_PATH" "$PP_DEST/${UUID}.mobileprovision"
          echo "Installed provisioning profile UUID: ${UUID}"
          echo "IOS_PROVISIONING_PROFILE_UUID=${UUID}" >> "$GITHUB_ENV"

      # -------------------------------------------------------------------------
      # Archive the app, then export it as an Ad Hoc .ipa.
      #
      # xcodebuild archive:
      #   -workspace   BuddyApp.xcworkspace (CocoaPods requires .xcworkspace)
      #   -scheme      BuddyApp
      #   -sdk         iphoneos  (device slice only — not simulator)
      #   -configuration Release
      #   -archivePath output path for the .xcarchive
      #
      # xcodebuild -exportArchive:
      #   Uses an inline ExportOptions.plist with method=ad-hoc.
      # -------------------------------------------------------------------------
      - name: Build archive
        working-directory: frontend-app/ios
        env:
          IOS_APPLE_TEAM_ID: ${{ secrets.IOS_APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace BuddyApp.xcworkspace \
            -scheme BuddyApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/BuddyApp.xcarchive" \
            DEVELOPMENT_TEAM="${IOS_APPLE_TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${IOS_PROVISIONING_PROFILE_UUID}"

      - name: Export Ad Hoc IPA
        env:
          IOS_APPLE_TEAM_ID: ${{ secrets.IOS_APPLE_TEAM_ID }}
        run: |
          # Write ExportOptions.plist using grouped echo — heredoc delimiters must be
          # at column 0 in shell, but YAML literal blocks require indentation >= the
          # block level, so heredocs and YAML are incompatible here.
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '  <key>method</key>'
            echo '  <string>ad-hoc</string>'
            echo '  <key>teamID</key>'
            echo "  <string>${IOS_APPLE_TEAM_ID}</string>"
            echo '  <key>signingStyle</key>'
            echo '  <string>manual</string>'
            echo '  <key>provisioningProfiles</key>'
            echo '  <dict>'
            echo '    <key>org.reactjs.native.example.BuddyApp</key>'
            echo "    <string>${IOS_PROVISIONING_PROFILE_UUID}</string>"
            echo '  </dict>'
            echo '  <key>compileBitcode</key>'
            echo '  <false/>'
            echo '  <key>uploadSymbols</key>'
            echo '  <true/>'
            echo '</dict>'
            echo '</plist>'
          } > "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/BuddyApp.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # -------------------------------------------------------------------------
      # Clean up the temporary keychain so the certificate doesn't linger on the
      # runner after the job (runners are ephemeral on GitHub-hosted, but good practice).
      # always() ensures cleanup runs even if a build step fails.
      # -------------------------------------------------------------------------
      - name: Clean up keychain
        if: always()
        run: |
          # Restore the default search list first, then delete the temp keychain.
          # Without this, the search list retains a dead path after deletion.
          security list-keychains -d user -s login.keychain-db 2>/dev/null || true
          security delete-keychain "${{ env.KEYCHAIN_PATH }}" 2>/dev/null || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: buddy360-ios-${{ inputs.environment }}-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

      # -------------------------------------------------------------------------
      # Authenticate with AWS via OIDC and push the IPA to S3.
      # Mirrors the Android workflow's upload pattern:
      #   app-assets/applications/ios/BuddyApp-YYYY-MM-DD-HH-MM-SS.ipa
      # -------------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          role-session-name: build-ios-ipa-${{ inputs.environment }}
          aws-region: us-east-1

      - name: Push IPA to S3
        env:
          BACKEND_BUCKET_NAME: ${{ secrets.BACKEND_BUCKET_NAME }}
        run: |
          # Discover the IPA dynamically — xcodebuild names it after the scheme,
          # which may differ from "BuddyApp.ipa" depending on Xcode version / settings.
          IPA_FILE=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          if [[ -z "$IPA_FILE" ]]; then
            echo "ERROR: No .ipa file found in $RUNNER_TEMP/ipa"
            ls -la "$RUNNER_TEMP/ipa/" || true
            exit 1
          fi
          TIMESTAMP=$(date -u '+%Y-%m-%d-%H-%M-%S')
          S3_KEY="app-assets/applications/ios/BuddyApp-${TIMESTAMP}.ipa"
          aws s3 cp "$IPA_FILE" "s3://${BACKEND_BUCKET_NAME}/${S3_KEY}"
          echo "Uploaded to s3://${BACKEND_BUCKET_NAME}/${S3_KEY}"
