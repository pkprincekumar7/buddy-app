name: Lint & Format Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.13.0"

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies + dev tools
        run: pip install -r requirements.txt ruff==0.11.2 mypy==1.15.0

      - name: ruff check
        run: ruff check .

      - name: ruff format (check only)
        run: ruff format --check .

      - name: mypy type check
        run: mypy app/

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check only)
        run: npx prettier --check "src/**/*.{js,jsx,css}"

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Bundle size budget (main JS ≤ 1.4 MB)
        run: |
          BUNDLE=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then echo "No bundle found"; exit 1; fi
          SIZE=$(wc -c < "$BUNDLE")
          LIMIT=1468006
          echo "Bundle: $BUNDLE — ${SIZE} bytes (limit ${LIMIT})"
          [ "$SIZE" -le "$LIMIT" ] || { echo "Main bundle exceeds 1.4 MB limit"; exit 1; }

  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v6.2.2
        with:
          tflint_version: v0.62.1

      - name: TFLint (infra-live-backend)
        run: tflint --chdir=infra-live-backend/terraform

      - name: TFLint (infra-live-edge)
        run: tflint --chdir=infra-live-edge/terraform

      - name: TFLint (infra-live-frontend)
        run: tflint --chdir=infra-live-frontend/terraform

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs full git history to scan past commits

      # ── secret & infra scanning (no runtime setup required) ─────────────────
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Gitleaks (secret detection)
        run: gitleaks detect --source . --redact

      - name: Hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile

      # ── Python security tools ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python security tools
        run: pip install semgrep bandit==1.9.4 pip-audit==2.9.0

      - name: Bandit (Python SAST)
        run: bandit -r backend/app/ -ll -q

      - name: pip-audit (backend dependency CVEs)
        run: pip-audit -r backend/requirements.txt --skip-editable --ignore-vuln PYSEC-2025-183

      - name: Semgrep (SAST)
        run: semgrep --config p/security-audit --error backend/app/ frontend/src/

      # ── Node.js security tools ───────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: npm audit (frontend dependency CVEs)
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Retire.js (browser library CVE scan)
        run: npx retire --path . --exitwith 1
        working-directory: frontend

      # ── CVE scanning (Trivy advisory DB) ────────────────────────────────────
      - name: Trivy (backend dependency CVE scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: backend/
          severity: HIGH,CRITICAL
          exit-code: '1'
          scanners: vuln

      - name: Trivy (frontend dependency CVE scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend/
          severity: HIGH,CRITICAL
          exit-code: '1'
          scanners: vuln
