# AWS environments (dev / stg / prod) — backend + frontend only.
# db    → RDS        (POSTGRES_HOST set via GitHub Secret)
# redis → ElastiCache (REDIS_URL set via GitHub Secret)
# All env vars are injected from .env written by the deploy workflow.
#
# UI:  http://<alb-dns>  → nginx proxies /api/* to backend:8000
# API: http://<ec2-ip>:${BACKEND_PORT:-8000}
#
services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: "${POSTGRES_PORT:?POSTGRES_PORT is required}"
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-30}
      JWT_REFRESH_EXPIRE_HOURS: ${JWT_REFRESH_EXPIRE_HOURS:-24}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:?COOKIE_DOMAIN is required}
      BEHIND_PROXY: ${BEHIND_PROXY:-true}
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_HOURLY_LIMIT: ${LLM_HOURLY_LIMIT:-200}
      POSTGRES_POOL_SIZE: ${POSTGRES_POOL_SIZE:-5}
      POSTGRES_MAX_OVERFLOW: ${POSTGRES_MAX_OVERFLOW:-10}
      DEFAULT_REGION: ${DEFAULT_REGION:-local}
      ROUTER_DB_URL: ${ROUTER_DB_URL:-}
      REGIONAL_DB_URLS: ${REGIONAL_DB_URLS:-{}}
      RECONCILER_INTERVAL_MINUTES: ${RECONCILER_INTERVAL_MINUTES:-5}
    networks:
      - buddy360_net
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 25s

  frontend:
    networks:
      - buddy360_net
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:?VITE_GOOGLE_CLIENT_ID is required}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  buddy360_net:
    name: buddy360_net
