repos:
  # --------------------------------------------------------------------------
  # General file hygiene
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # --------------------------------------------------------------------------
  # Backend — Python (ruff: lint + format, mypy: types)
  # --------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # --------------------------------------------------------------------------
  # Frontend — ESLint + Prettier
  # --------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        language: system
        entry: bash -c "cd frontend && npx eslint --quiet --fix $@" --
        files: ^frontend/src/.*\.(js|mjs|cjs|jsx)$
        pass_filenames: true

      - id: prettier
        name: Prettier (frontend)
        language: system
        entry: bash -c "cd frontend && npx prettier --write $@" --
        files: ^frontend/src/.*\.(js|mjs|cjs|jsx|css)$
        pass_filenames: true
