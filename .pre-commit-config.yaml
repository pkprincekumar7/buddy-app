repos:
  # --------------------------------------------------------------------------
  # General file hygiene
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # --------------------------------------------------------------------------
  # Backend — Python (ruff: lint + format, mypy: types)
  # --------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # --------------------------------------------------------------------------
  # Frontend — ESLint + Prettier are handled by Husky + lint-staged.
  # Run `npm install` inside frontend/ to install the git hooks.
  # --------------------------------------------------------------------------
